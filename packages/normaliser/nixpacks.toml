# Nixpacks config for Railway — uses system Chromium for Playwright

[phases.setup]
nixPkgs = [
  "nodejs_20",
  "chromium",
  "glib",
  "nss",
  "nspr",
  "atk",
  "cups",
  "libdrm",
  "gtk3",
  "pango",
  "cairo",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "mesa",
  "libxkbcommon",
  "alsa-lib"
]

[variables]
PLAYWRIGHT_BROWSERS_PATH = "0"
PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"
PLAYWRIGHT_EXECUTABLE_PATH = "/run/current-system/sw/bin/chromium"
